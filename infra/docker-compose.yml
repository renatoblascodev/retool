services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: toolstack
      POSTGRES_USER: toolstack
      POSTGRES_PASSWORD: toolstack_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolstack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://toolstack:toolstack_secret@postgres:5432/toolstack
      JWT_SECRET_KEY: local-dev-secret
    volumes:
      - ../backend/app:/app/app
      - ../backend/requirements.txt:/app/requirements.txt
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../frontend:/workspace
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
