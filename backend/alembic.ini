[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL is injected via environment variable.
# Alembic will use the synchronous psycopg2 driver for offline mode and the
# async engine (set in env.py) for online mode.
sqlalchemy.url = postgresql://toolstack:toolstack_secret@localhost:5432/toolstack

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
