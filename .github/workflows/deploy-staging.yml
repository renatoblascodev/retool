name: Deploy — Staging

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy-staging.yml'

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # never cancel an in-flight deploy; wait for it

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging        # maps to GitHub Environment with protection rules / secrets

    env:
      REGISTRY: ghcr.io
      IMAGE: ghcr.io/${{ github.repository }}/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker setup ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── Deploy via SSH ────────────────────────────────────────────
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            cd /opt/toolstack

            # Pull the exact image built in this run
            docker pull ${{ env.IMAGE }}:${{ github.sha }}
            docker tag  ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest

            # Run any pending migrations before swapping the app container
            docker compose run --rm \
              -e IMAGE_TAG=${{ github.sha }} \
              backend alembic upgrade head

            # Rolling update — restart only the backend container
            IMAGE_TAG=${{ github.sha }} docker compose up -d --no-deps --pull never backend

            # Verify health before finishing
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "Staging backend healthy"
                exit 0
              fi
              sleep 4
            done
            echo "Staging backend did not pass health check — rolling back"
            docker compose up -d --no-deps --pull never --force-recreate backend
            exit 1

      # ── Post-deploy cleanup ───────────────────────────────────────
      - name: Prune old images on staging
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          script: docker image prune -f

      # ── Failure annotation ───────────────────────────────────────
      - name: Annotate failed deploy
        if: failure()
        run: |
          echo "::error::Staging deploy failed for commit ${{ github.sha }}. Check SSH logs above."
