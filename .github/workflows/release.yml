name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Release
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/toolstack-ai

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build, Push and Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      # ── Docker setup ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build multi-stage image (frontend embedded in backend) ────
      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── GitHub Release with auto-generated changelog ──────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker image

            ```
            docker pull ${{ env.IMAGE }}:${{ github.ref_name }}
            ```

            ## Migrations

            Run pending Alembic migrations before starting the new container:

            ```bash
            docker run --rm -e DATABASE_URL=<dsn> \
              ${{ env.IMAGE }}:${{ github.ref_name }} \
              alembic upgrade head
            ```
